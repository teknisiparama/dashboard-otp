<!DOCTYPE html>
<html lang="en">
<head>

    <title>OTP CODE</title>

<body>
    <img src="Heron.png" class="Heron">

        <input type="text" id="otp3" maxlength="1" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input type="text" id="otp4" maxlength="1" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input type="text" id="otp5" maxlength="1" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input type="text" id="otp6" maxlength="1" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>

    <br>

    <button onclick="sendOTP()">
        SEND
    </button>

    <div id="popup">

        OTP Terkirim

    </div>

    <script src="script.js"></script>

</html>
